services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: job-search-os-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_search_os
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d job_search_os"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp:
    profiles: ["mcp"]
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: job-search-os-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/job_search_os?schema=public
      JOB_SEARCH_OS_APP_URL: ${JOB_SEARCH_OS_APP_URL:-http://host.docker.internal:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    stdin_open: true

volumes:
  postgres-data:
